services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sistema-chamados-app
    environment:
      SESSION_COOKIE: sistema_chamados_alpine_session
    command: >
      sh -lc "mkdir -p /var/www/storage/framework/cache /var/www/storage/framework/sessions /var/www/storage/framework/views /var/www/storage/framework/testing /var/www/bootstrap/cache
      && chown -R www-data:www-data /var/www/storage /var/www/bootstrap/cache
      && chmod -R a+rwX /var/www/storage /var/www/bootstrap/cache
      && php-fpm"
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - storage_alpine:/var/www/storage
      - uploads_shared:/var/www/storage/app/public
      - cache_alpine:/var/www/bootstrap/cache
    depends_on:
      - db

  web:
    image: nginx:1.27-alpine
    container_name: sistema-chamados-web
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - storage_alpine:/var/www/storage
      - uploads_shared:/var/www/storage/app/public
      - cache_alpine:/var/www/bootstrap/cache
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  app_debian:
    build:
      context: .
      dockerfile: Dockerfile.debian
    container_name: sistema-chamados-app-debian
    environment:
      SESSION_COOKIE: sistema_chamados_debian_session
    command: >
      sh -lc "mkdir -p /var/www/storage/framework/cache /var/www/storage/framework/sessions /var/www/storage/framework/views /var/www/storage/framework/testing /var/www/bootstrap/cache
      && chown -R www-data:www-data /var/www/storage /var/www/bootstrap/cache
      && chmod -R a+rwX /var/www/storage /var/www/bootstrap/cache
      && php-fpm"
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - storage_debian:/var/www/storage
      - uploads_shared:/var/www/storage/app/public
      - cache_debian:/var/www/bootstrap/cache
    depends_on:
      - db

  web_debian:
    image: nginx:1.27-alpine
    container_name: sistema-chamados-web-debian
    ports:
      - "8001:80"
    volumes:
      - ./:/var/www
      - storage_debian:/var/www/storage
      - uploads_shared:/var/www/storage/app/public
      - cache_debian:/var/www/bootstrap/cache
      - ./.docker/nginx/default-debian.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app_debian

  db:
    image: mysql:8.0
    container_name: sistema-chamados-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sistema_chamados}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-root-password}
      MYSQL_USER: ${MYSQL_USER:-laravel}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me-db-password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
  storage_alpine:
  cache_alpine:
  storage_debian:
  cache_debian:
  uploads_shared:
